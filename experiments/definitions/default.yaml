id: harness-fit-v1

models:
  - id: gemini-flash
    provider: google
    model: gemini-3.5-flash
  - id: gpt-luna
    provider: openai
    model: gpt-5.6-luna
  - id: claude-haiku
    provider: anthropic
    model: claude-haiku-4-5

benchmark:
  trainingSplit: train
  developmentSplit: dev
  testSplit: test

trials:
  search: 3
  finalists: 5
  headline: 10

optimizer:
  algorithm: coordinate-hill-climbing
  randomRestarts: 3
  maximumCandidatesPerModel: 120
  minimumSuccessImprovement: 0.03

limits:
  maxTurns: 24
  maxToolCalls: 40
  maxWallTimeSeconds: 600
  maxOutputTokens: 32000
  maxCostUsdPerRun: 5

objective:
  successWeight: 1.0
  costWeight: 0.10
  latencyWeight: 0.05
  varianceWeight: 0.10

reporting:
  transferMatrix: true
  ablations: true
  paretoFrontiers: true
  confidenceIntervals: true
