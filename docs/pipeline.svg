<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140" width="800" height="140">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1" />
    </marker>
  </defs>

  <!-- CLI -->
  <rect x="10" y="45" width="90" height="50" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="55" y="65" text-anchor="middle" fill="#e2e8f0" font-size="13" font-family="monospace" font-weight="bold">CLI</text>
  <text x="55" y="82" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="monospace">Entry point</text>

  <line x1="100" y1="70" x2="125" y2="70" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Coordinator -->
  <rect x="130" y="45" width="110" height="50" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <text x="185" y="63" text-anchor="middle" fill="#e2e8f0" font-size="13" font-family="monospace" font-weight="bold">Coordinator</text>
  <text x="185" y="82" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="monospace">Orchestration</text>

  <line x1="240" y1="70" x2="265" y2="70" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Optimizer -->
  <rect x="270" y="45" width="100" height="50" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
  <text x="320" y="63" text-anchor="middle" fill="#e2e8f0" font-size="13" font-family="monospace" font-weight="bold">Optimizer</text>
  <text x="320" y="82" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="monospace">Hill climbing</text>

  <line x1="370" y1="70" x2="395" y2="70" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Runtime -->
  <rect x="400" y="45" width="100" height="50" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="2"/>
  <text x="450" y="63" text-anchor="middle" fill="#e2e8f0" font-size="13" font-family="monospace" font-weight="bold">Runtime</text>
  <text x="450" y="82" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="monospace">Agent loop</text>

  <line x1="500" y1="70" x2="525" y2="70" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Adapter -->
  <rect x="530" y="45" width="90" height="50" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="575" y="63" text-anchor="middle" fill="#e2e8f0" font-size="13" font-family="monospace" font-weight="bold">Adapter</text>
  <text x="575" y="82" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="monospace">Provider API</text>

  <!-- Bottom row: Evaluator and Storage -->
  <rect x="200" y="105" width="100" height="30" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="250" y="124" text-anchor="middle" fill="#e2e8f0" font-size="11" font-family="monospace">Evaluator</text>

  <rect x="400" y="105" width="90" height="30" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="445" y="124" text-anchor="middle" fill="#e2e8f0" font-size="11" font-family="monospace">Storage</text>

  <!-- Feedback arrow -->
  <path d="M 590 95 C 590 125, 490 125, 490 105" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="520" y="135" text-anchor="middle" fill="#475569" font-size="8" font-family="monospace">feedback</text>
</svg>
